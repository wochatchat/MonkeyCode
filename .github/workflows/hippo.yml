name: Hippo Android APK

# 单独打包签名版 APK：基于本项目 Expo 原有打包方式（expo prebuild -> Gradle assembleRelease），
# 内置固定 keystore，签名一致 + versionCode 自动递增，可直接覆盖安装升级。
on:
  workflow_dispatch:        # 手动触发
    inputs:
      version_name:
        description: "版本名 versionName（留空则沿用 app.json 里的 version）"
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/hippo.yml"

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"
  # ---- 内置固定 keystore（PKCS12，base64）。alias/密码固定，每次构建同一签名 ----
  KEYSTORE_ALIAS: hippo
  KEYSTORE_PASSWORD: hippo123456
  KEYSTORE_BASE64: 

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java (for Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: mobile
        run: npm install --no-audit --no-fund

      # 项目本来的打包方式：Expo 预构建生成本地 android/ 目录
      - name: Expo prebuild (generate android/)
        working-directory: mobile
        run: npx expo prebuild --platform android --no-install

      # 内置固定 keystore：从 base64 还原出签名文件
      - name: Restore built-in keystore
        working-directory: mobile
        run: |
          echo "${{ env.KEYSTORE_BASE64 }}" | base64 -d > android/app/hippo.keystore
          ls -la android/app/hippo.keystore

      # 注入签名配置 + versionCode 自动递增（用 GitHub run_number 保证每次变大，可覆盖升级）
      - name: Inject signing config & bump versionCode
        working-directory: mobile
        run: |
          python3 - <<'PY'
          import re, os
          p = "android/app/build.gradle"
          s = open(p, encoding="utf-8").read()
          alias = os.environ["KEYSTORE_ALIAS"]; pwd = os.environ["KEYSTORE_PASSWORD"]
          vc = os.environ["VERSION_CODE"]; vn = os.environ.get("VERSION_NAME", "")

          # 1) 在 android { } 内注入 signingConfigs
          signing = f'''
              signingConfigs {{
                  release {{
                      storeFile file("hippo.keystore")
                      storePassword "{pwd}"
                      keyAlias "{alias}"
                      keyPassword "{pwd}"
                  }}
              }}
          '''
          if "signingConfigs {" not in s:
              s = re.sub(r"(android\s*\{)", r"\1\n" + signing, s, count=1)

          # 2) buildTypes.release 使用 release 签名
          if re.search(r"release\s*\{[^}]*signingConfig", s) is None:
              s = re.sub(r"(buildTypes\s*\{[\s\S]*?release\s*\{)",
                         r"\1\n            signingConfig signingConfigs.release", s, count=1)

          # 3) versionCode 递增
          s = re.sub(r"versionCode\s+\d+", f"versionCode {vc}", s, count=1)
          # 4) versionName（可选覆盖）
          if vn:
              s = re.sub(r'versionName\s+"[^"]*"', f'versionName "{vn}"', s, count=1)

          open(p, "w", encoding="utf-8").write(s)
          print("versionCode ->", vc, "| versionName ->", vn or "(unchanged)")
          PY
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ inputs.version_name }}

      - name: Show injected gradle config
        working-directory: mobile
        run: sed -n '/signingConfigs/,/^  }/p' android/app/build.gradle | head -40

      - name: Build release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          ORG_GRADLE_PROJECT_hermesEnabled: "true"

      - name: Verify APK is signed
        working-directory: mobile
        run: |
          APK=$(ls android/app/build/outputs/apk/release/*.apk | head -1)
          echo "APK: $APK"
          "$ANDROID_HOME/build-tools/"*/apksigner verify --print-certs "$APK" | head -10 || true

      - name: Rename APK
        working-directory: mobile
        run: |
          APK=$(ls android/app/build/outputs/apk/release/*.apk | head -1)
          OUT="hippo-v${{ inputs.version_name || 'latest' }}-vc${{ github.run_number }}.apk"
          mkdir -p ../_build && cp "$APK" "../_build/$OUT"
          echo "输出: _build/$OUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hippo-apk
          path: _build/*.apk
